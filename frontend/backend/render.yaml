# Render Blueprint — infrastructure-as-code for the contact API.
# Deploy: https://render.com/deploy?repo=<your-github-repo-url>

services:
  - type: web
    name: portfolio-contact-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: PORT
        value: 10000
      - key: FRONTEND_ORIGIN
        sync: false # set this in the Render dashboard after first deploy
      - key: SMTP_HOST
        sync: false # e.g. smtp.gmail.com
      - key: SMTP_PORT
        sync: false # 587
      - key: SMTP_USER
        sync: false # your email
      - key: SMTP_PASS
        sync: false # app password
      - key: MAIL_TO
        sync: false # destination inbox (defaults to SMTP_USER)
